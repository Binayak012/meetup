<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeetUp - Video Conferencing</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="home-page">
  <div class="home-container">
    <div class="home-card">

      <div class="logo">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="8" fill="#2563eb"/>
          <rect x="7" y="12" width="16" height="16" rx="2" fill="white"/>
          <path d="M23 18l8-5v14l-8-5V18z" fill="white"/>
        </svg>
        <h1>MeetUp</h1>
      </div>
      <p class="tagline">Simple, free video meetings for everyone</p>

      <div class="name-section">
        <label for="display-name">Your name</label>
        <input
          type="text"
          id="display-name"
          placeholder="Enter your name"
          maxlength="30"
          autocomplete="off"
        >
      </div>

      <div class="actions">
        <button id="new-meeting-btn" class="btn btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          New Meeting
        </button>

        <div class="divider"><span>or join existing</span></div>

        <div class="join-section">
          <input
            type="text"
            id="room-id-input"
            placeholder="Enter room ID"
            maxlength="20"
            autocomplete="off"
            spellcheck="false"
          >
          <button id="join-btn" class="btn btn-secondary">Join</button>
        </div>
      </div>

    </div>
  </div>

  <script src="/home.js"></script>
</body>
</html>
