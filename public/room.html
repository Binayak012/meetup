<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeetUp</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="room-page">

  <!-- Header -->
  <header class="room-header">
    <div class="logo-sm">
      <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="8" fill="#2563eb"/>
        <rect x="7" y="12" width="16" height="16" rx="2" fill="white"/>
        <path d="M23 18l8-5v14l-8-5V18z" fill="white"/>
      </svg>
      MeetUp
    </div>

    <div class="room-info">
      <div class="room-id-badge">
        Room:&nbsp;<strong id="room-id-display"></strong>
        <button class="copy-btn" id="copy-link-btn" title="Copy invite link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
      </div>
      <div class="participant-count">
        <span class="count-dot"></span>
        <span id="participant-count">1</span> participant<span id="participant-plural"></span>
      </div>
    </div>
  </header>

  <!-- Video grid -->
  <main style="position:relative; flex:1; overflow:hidden;">
    <div class="video-grid" id="video-grid"></div>
    <div class="waiting-msg" id="waiting-msg">
      <h3>You're the only one here</h3>
      <p>Share the room link to invite others</p>
    </div>
  </main>

  <!-- Controls -->
  <div class="controls">
    <div class="ctrl-wrap">
      <button class="ctrl-btn on" id="mic-btn" title="Toggle microphone">
        <svg id="mic-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="11" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="8" y1="22" x2="16" y2="22"/>
        </svg>
      </button>
      <span class="ctrl-label" id="mic-label">Mute</span>
    </div>

    <div class="ctrl-wrap">
      <button class="ctrl-btn on" id="cam-btn" title="Toggle camera">
        <svg id="cam-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="23 7 16 12 23 17 23 7"/>
          <rect x="1" y="5" width="15" height="14" rx="2"/>
        </svg>
      </button>
      <span class="ctrl-label" id="cam-label">Stop Video</span>
    </div>

    <button class="ctrl-btn leave" id="leave-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Leave
    </button>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Libraries -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="/room.js"></script>
</body>
</html>
