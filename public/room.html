<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeetUp</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="room-page">

  <!-- ── Header ─────────────────────────────────────── -->
  <header class="room-header">
    <div class="logo-sm">
      <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="8" fill="#2563eb"/>
        <rect x="7" y="12" width="16" height="16" rx="2" fill="white"/>
        <path d="M23 18l8-5v14l-8-5V18z" fill="white"/>
      </svg>
      MeetUp
    </div>

    <div class="room-info">
      <div class="room-id-badge">
        Room:&nbsp;<strong id="room-id-display"></strong>
        <button class="copy-btn" id="copy-link-btn" title="Copy invite link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
      </div>
      <div class="participant-count">
        <span class="count-dot"></span>
        <span id="participant-count">1</span>&nbsp;participant<span id="participant-plural"></span>
      </div>
    </div>
  </header>

  <!-- ── Room Body (video + chat) ───────────────────── -->
  <div class="room-body">

    <!-- Video Area -->
    <main class="video-area">
      <div class="video-grid" id="video-grid"></div>
      <div class="waiting-msg" id="waiting-msg">
        <h3>You're the only one here</h3>
        <p>Share the room link to invite others</p>
      </div>
    </main>

    <!-- Chat Panel -->
    <aside class="chat-panel" id="chat-panel">
      <div class="chat-header">
        <h3>In-call messages</h3>
        <button class="chat-close-btn" id="chat-close-btn" title="Close chat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="chat-messages" id="chat-messages">
        <div class="chat-empty" id="chat-empty">No messages yet. Say hi!</div>
      </div>
      <div class="chat-input-area">
        <textarea id="chat-input" placeholder="Send a message..." rows="1"></textarea>
        <button class="chat-send-btn" id="chat-send-btn" title="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </aside>

  </div><!-- .room-body -->

  <!-- ── Controls ───────────────────────────────────── -->
  <div class="controls">

    <!-- Mic -->
    <div class="ctrl-wrap">
      <button class="ctrl-btn on" id="mic-btn" title="Toggle microphone">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="11" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="8" y1="22" x2="16" y2="22"/>
        </svg>
      </button>
      <span class="ctrl-label" id="mic-label">Mute</span>
    </div>

    <!-- Camera -->
    <div class="ctrl-wrap">
      <button class="ctrl-btn on" id="cam-btn" title="Toggle camera">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="23 7 16 12 23 17 23 7"/>
          <rect x="1" y="5" width="15" height="14" rx="2"/>
        </svg>
      </button>
      <span class="ctrl-label" id="cam-label">Stop Video</span>
    </div>

    <!-- Screen Share -->
    <div class="ctrl-wrap">
      <button class="ctrl-btn on" id="screen-btn" title="Share screen">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <line x1="8" y1="21" x2="16" y2="21"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
      </button>
      <span class="ctrl-label" id="screen-label">Share</span>
    </div>

    <!-- Chat -->
    <div class="ctrl-wrap">
      <button class="ctrl-btn on" id="chat-btn" title="Toggle chat">
        <span class="chat-badge" id="chat-badge"></span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </button>
      <span class="ctrl-label">Chat</span>
    </div>

    <!-- Leave -->
    <button class="ctrl-btn leave" id="leave-btn">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Leave
    </button>

  </div><!-- .controls -->

  <div class="toast" id="toast"></div>

  <!-- Scripts -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="/room.js"></script>
</body>
</html>
